<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alphabet Typing Adventure 🦸‍♂️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
    body { font-family: 'Comic Neue', cursive; }
    .letter-box { transition: all 0.3s ease; }
    .typed-letter { animation: pop 0.3s ease; }
    @keyframes pop { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-200 via-pink-200 to-blue-200 min-h-screen">

  <!-- Password Screen -->
  <div id="password-screen" class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-white rounded-3xl shadow-2xl p-10 max-w-md w-full text-center">
      <div class="text-6xl mb-6">🔒</div>
      <h1 class="text-3xl font-bold text-purple-700 mb-4">Kids Typing Adventure</h1>
      <p class="text-gray-600 mb-8">Enter the password to start the practice<br><span class="text-sm">(Only for enrolled students)</span></p>
      
      <input id="password-input" 
             type="password" 
             placeholder="Enter password here"
             class="w-full px-6 py-4 text-xl border-2 border-purple-300 rounded-2xl focus:outline-none focus:border-purple-600 mb-6">
      
      <button onclick="checkPassword()" 
              class="w-full py-4 bg-purple-600 hover:bg-purple-700 text-white font-bold text-xl rounded-2xl transition">
        Unlock Practice →
      </button>
      
      <p id="error-msg" class="text-red-500 mt-4 min-h-[24px]"></p>
    </div>
  </div>

  <!-- Main Game (hidden until password correct) -->
  <div id="game-screen" class="hidden max-w-4xl mx-auto p-4 md:p-8">
    <!-- Same beautiful game UI as before -->
    <div class="flex flex-col md:flex-row items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div class="text-5xl">🦸‍♂️</div>
        <h1 class="text-4xl md:text-5xl font-bold text-purple-700">Alphabet Typing Adventure</h1>
      </div>
      <a href="index.html" class="mt-4 md:mt-0 px-6 py-3 bg-white rounded-2xl shadow-md hover:shadow-xl text-purple-600 font-bold">← Back to Catalog</a>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-6 md:p-10">
      <div class="text-center mb-8">
        <p class="text-xl md:text-2xl text-gray-700">Type letters A to Z in order!</p>
      </div>

      <div class="flex flex-wrap justify-center gap-6 mb-8">
        <div class="bg-purple-100 text-purple-800 rounded-2xl px-8 py-4 text-center min-w-[160px]">
          <div class="text-xs uppercase font-bold">Time</div>
          <div id="timer" class="text-5xl font-bold tabular-nums">00:00</div>
        </div>
        <div class="bg-green-100 text-green-800 rounded-2xl px-8 py-4 text-center min-w-[160px]">
          <div class="text-xs uppercase font-bold">Letters Done</div>
          <div id="progress" class="text-5xl font-bold">0 / 26</div>
        </div>
        <div class="bg-yellow-100 text-yellow-800 rounded-2xl px-8 py-4 text-center min-w-[160px]">
          <div class="text-xs uppercase font-bold">Speed</div>
          <div id="speed" class="text-5xl font-bold">0 LPM</div>
        </div>
      </div>

      <div class="text-center mb-8">
        <p class="text-lg text-gray-600 mb-3">Type this letter now 👇</p>
        <div id="next-letter" class="letter-box mx-auto w-28 h-28 md:w-36 md:h-36 bg-gradient-to-br from-yellow-300 to-orange-400 text-white rounded-3xl flex items-center justify-center text-7xl md:text-8xl font-bold shadow-inner border-8 border-white">
          A
        </div>
      </div>

      <div class="mb-8">
        <p class="text-lg text-gray-600 mb-3 text-center">You have typed:</p>
        <div id="typed-sequence" class="flex flex-wrap gap-2 justify-center min-h-[80px] bg-gray-50 rounded-2xl p-6 border-2 border-dashed border-gray-200"></div>
      </div>

      <div id="status" class="text-center text-2xl font-bold min-h-[60px]"></div>

      <div class="flex flex-col md:flex-row gap-4 justify-center">
        <button onclick="startOver()" class="px-8 py-4 bg-red-500 hover:bg-red-600 text-white font-bold text-xl rounded-2xl">🔄 Start Over</button>
        <button onclick="pauseTimer()" id="pause-btn" class="px-8 py-4 bg-gray-500 hover:bg-gray-600 text-white font-bold text-xl rounded-2xl">⏸️ Pause</button>
      </div>
    </div>
  </div>

  <script>
    // === PASSWORD PROTECTION ===
    const CORRECT_PASSWORD = "kids2026";   // ← CHANGE THIS TO YOUR OWN PASSWORD

    function checkPassword() {
      const input = document.getElementById('password-input').value.trim();
      const errorMsg = document.getElementById('error-msg');
      
      if (input === CORRECT_PASSWORD) {
        document.getElementById('password-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        initGame();   // Start the game
      } else {
        errorMsg.textContent = "❌ Wrong password. Please contact your teacher.";
        setTimeout(() => errorMsg.textContent = "", 3000);
      }
    }

    // === GAME CODE (same as before, slightly cleaned) ===
    let currentIndex = 0;
    let letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    let typedLetters = [];
    let startTime = null;
    let timerInterval = null;
    let isPaused = false;

    const nextLetterEl = document.getElementById('next-letter');
    const typedSequenceEl = document.getElementById('typed-sequence');
    const timerEl = document.getElementById('timer');
    const progressEl = document.getElementById('progress');
    const speedEl = document.getElementById('speed');
    const statusEl = document.getElementById('status');
    const pauseBtn = document.getElementById('pause-btn');

    function updateNextLetter() {
      nextLetterEl.textContent = currentIndex < letters.length ? letters[currentIndex] : '🎉';
    }

    function addToTypedSequence(letter) {
      const span = document.createElement('span');
      span.className = `typed-letter inline-flex items-center justify-center w-10 h-10 md:w-12 md:h-12 bg-green-400 text-white text-3xl md:text-4xl font-bold rounded-2xl shadow-md`;
      span.textContent = letter;
      typedSequenceEl.appendChild(span);
    }

    function startTimer() {
      if (timerInterval) return;
      startTime = Date.now();
      timerInterval = setInterval(() => {
        if (isPaused) return;
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
        const sec = (elapsed % 60).toString().padStart(2, '0');
        timerEl.textContent = `${min}:${sec}`;

        const speed = Math.round(currentIndex / (elapsed / 60) || 0);
        speedEl.textContent = `${speed} LPM`;
      }, 200);
    }

    function handleKeyPress(e) {
      if (!/^[a-zA-Z]$/.test(e.key)) return;
      const pressed = e.key.toUpperCase();

      if (pressed === letters[currentIndex]) {
        typedLetters.push(pressed);
        addToTypedSequence(pressed);
        currentIndex++;
        progressEl.textContent = `${currentIndex} / 26`;
        updateNextLetter();
        statusEl.innerHTML = `✅ Good job!`;

        if (currentIndex >= letters.length) {
          clearInterval(timerInterval);
          statusEl.innerHTML = `<div class="text-green-600 text-3xl">🎉 Congratulations! You finished all letters!</div>`;
          createConfetti();
        }
      } else {
        statusEl.innerHTML = `<span class="text-red-500">Try ${letters[currentIndex]} next</span>`;
      }
    }

    function createConfetti() {
      for (let i = 0; i < 60; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.style.position = 'fixed'; c.style.zIndex = '9999';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.top = '-30px';
          c.textContent = '⭐🎉🌟🦸‍♂️'[Math.floor(Math.random()*4)];
          document.body.appendChild(c);
          c.animate([{transform: 'translateY(0)'}, {transform: `translateY(${window.innerHeight}px)`}], {duration: 2500 + Math.random()*2000});
          setTimeout(() => c.remove(), 5000);
        }, i * 8);
      }
    }

    window.startOver = function() {
      currentIndex = 0; typedLetters = []; isPaused = false;
      typedSequenceEl.innerHTML = '';
      progressEl.textContent = '0 / 26';
      speedEl.textContent = '0 LPM';
      timerEl.textContent = '00:00';
      statusEl.innerHTML = '';
      updateNextLetter();
    };

    window.pauseTimer = function() {
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? '▶️ Resume' : '⏸️ Pause';
    };

    function initGame() {
      updateNextLetter();
      document.addEventListener('keydown', handleKeyPress);
      console.log('%cKids Typing Adventure unlocked!', 'color:purple');
    }

    // Allow pressing Enter on password field
    document.getElementById('password-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') checkPassword();
    });
  </script>
</body>
</html>
